<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speaking Pictorial Translator</title>
</head>
<body>
  <h1>Speaking Pictorial Translator</h1>
  <input id="file" type="file" accept="image/*" />
  <button id="runBtn">Upload, Translate, Speak</button>
  <p id="status"></p>
  <img id="image" width="420" alt="uploaded image" />
  <h3>Translated text</h3>
  <pre id="translated"></pre>
  <audio id="player" controls></audio>

  <script src="scripts.js"></script>
</body>
</html>
